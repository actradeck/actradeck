name: Feature request
description: Suggest an improvement or new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        ActraDeck is early and deliberately scoped: a vendor-neutral control plane for
        coding-agent **approvals, secrets, and audit**. Proposals that sharpen that
        wedge are most likely to land. (See [README](https://github.com/actradeck/actradeck/blob/main/README.md).)
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What are you trying to do, and where does ActraDeck fall short today?
      placeholder: As someone running Claude Code and Codex, I want … because … .
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see? Rough is fine.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches, workarounds, or existing tools you have tried.
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - sidecar (daemon / redaction / approval)
        - backend (ingestion / event store / state / realtime)
        - webui (cockpit)
        - cross-vendor / event model
        - docs / onboarding
        - other
    validations:
      required: true
