name: CodeQL

# Code scanning with the "security-and-quality" query suite (security + maintainability).
# CodeQL analyzes JavaScript/TypeScript from source (build-mode: none — no compilation needed),
# so this job does not depend on the workspace build. Results surface in the Security tab.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly re-scan so newly published CodeQL queries catch latent issues (Mon 03:23 UTC).
    - cron: "23 3 * * 1"

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      # Required by github/codeql-action to upload results to code scanning.
      security-events: write
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # security-and-quality = security-extended + maintainability/reliability queries.
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
